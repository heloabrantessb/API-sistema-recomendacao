version: "3.9"
services:
  db:
    image: postgres:16
    container_name: sistema-recomendacoes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sistema_recomendacoes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sistema_recomendacoes"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  postgres_data: